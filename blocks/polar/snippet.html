<!-- ============================================================
     willy-design · block: polar
     ============================================================
     Botón checkout Polar para producto one-time o suscripción.

     Reemplaza:
     - {{POLAR_CL}}      ej: ROpXWK8yoZTczUq1Q0CFb8hcSF0tynKJnNTfH1UWVIa
                              (parte después de "polar_cl_")
     - {{LABEL}}         texto del botón · ej: "Iniciar con US$100"
     - {{PRICE}}         display de precio · ej: "US$100"
     - {{ORIG_PRICE}}    precio original tachado · ej: "US$200" o "" si no hay
     - {{SAVINGS}}       texto de ahorro · ej: "ahorras US$50" o ""
     - {{TRUST_LINE}}    microcopy bajo el botón · ej: "Pagas seguro · Polar Stripe"
============================================================ -->

<div class="polar-cta-wrap text-center">

  {{#ORIG_PRICE}}
  <div class="flex items-center justify-center gap-3 mb-2">
    <span class="text-muted line-through text-sm">{{ORIG_PRICE}}</span>
    {{#SAVINGS}}<span class="bg-accent text-accent-fg text-xs font-bold px-2 py-1 rounded-full">{{SAVINGS}}</span>{{/SAVINGS}}
  </div>
  {{/ORIG_PRICE}}

  <div class="font-display font-extrabold text-3xl sm:text-4xl text-ink mb-4">{{PRICE}}</div>

  <a href="https://buy.polar.sh/polar_cl_{{POLAR_CL}}"
     class="polar-btn btn-shine inline-flex items-center justify-center gap-2 bg-ink hover:bg-ink-2 text-white font-bold px-8 py-4 rounded-2xl text-base sm:text-lg shadow-xl transition w-full sm:w-auto"
     data-polar-checkout="primary">
    {{LABEL}}
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </a>

  <p class="text-xs text-muted mt-3">{{TRUST_LINE}}</p>

  <!-- Trust badges (opcional pero mejora conversión) -->
  <div class="flex items-center justify-center gap-4 mt-3 text-xs text-muted">
    <span class="flex items-center gap-1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/></svg>
      Pago seguro SSL
    </span>
    <span class="flex items-center gap-1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Tarjeta crédito/débito
    </span>
  </div>

</div>

<style>
.btn-shine {
  position: relative;
  overflow: hidden;
}
.btn-shine::after {
  content: '';
  position: absolute;
  top: 0; left: -75%;
  width: 50%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
  transform: skewX(-25deg);
  transition: left .6s ease;
}
.btn-shine:hover::after { left: 125%; }
</style>

<script>
document.querySelectorAll('a[data-polar-checkout]').forEach(a => {
  a.addEventListener('click', () => {
    try {
      const variant = a.dataset.polarCheckout;
      if (window.dataLayer) window.dataLayer.push({ event: 'polar_checkout_click', variant });
      if (window.fbq) window.fbq('track', 'InitiateCheckout', { source: variant });
      if (window.gtag) window.gtag('event', 'begin_checkout', { variant });
    } catch(e) {}
  });
});
</script>
